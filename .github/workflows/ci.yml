name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libftdi1-dev
      - name: Run Clippy
        run: cargo clippy --workspace --exclude rflasher-wasm --all-targets --all-features -- -D warnings

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libftdi1-dev
      - name: Run tests
        run: cargo test --workspace --exclude rflasher-wasm --all-features

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev libftdi1-dev
      - name: Build
        run: cargo build --workspace --exclude rflasher-wasm --all-features --release

  build-portable:
    name: Build portable (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build portable programmers
        run: cargo build -p rflasher --no-default-features --features portable-programmers --release

  no-std:
    name: no_std embedded checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-none
      - uses: Swatinem/rust-cache@v2
      - name: Check rflasher-core without std
        run: cargo check -p rflasher-core --no-default-features --target x86_64-unknown-none
      - name: Check rflasher-core sync without std
        run: cargo check -p rflasher-core --no-default-features --features is_sync --target x86_64-unknown-none
      - name: Check rflasher-internal sync without std
        run: cargo check -p rflasher-internal --no-default-features --features is_sync --target x86_64-unknown-none

  wasm:
    name: WASM Build
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: --cfg=web_sys_unstable_apis
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (WASM)
        run: cargo clippy --package rflasher-wasm --target wasm32-unknown-unknown -- -D warnings
      - name: Build (WASM)
        run: cargo build --package rflasher-wasm --target wasm32-unknown-unknown --release
